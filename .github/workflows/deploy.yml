name: Build and push BlueOS extension

# Custom workflow (not Deploy-BlueOS-Extension): upstream esphome/esphome has no
# linux/arm/v7 image, but Deploy-BlueOS-Extension@v1.2.0 always builds an arm/v7
# artifact after a successful push and fails the job. We push arm64+amd64 only.

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: vshie/blueos-site-esphome
  PLATFORMS: linux/arm64/v8,linux/amd64

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve tags
        id: tags
        run: |
          VERSION=${GITHUB_REF##*/}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          TAGS="${IMAGE_NAME}:${VERSION}"
          if [[ $VERSION =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi
          GIT_HASH_SHORT=$(git rev-parse --short "$GITHUB_SHA")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "git_hash=${GIT_HASH_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push (arm64 + amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            IMAGE_NAME=esphome
            AUTHOR=Tony White
            AUTHOR_EMAIL=tony@bluerobotics.com
            MAINTAINER=Tony White
            MAINTAINER_EMAIL=tony@bluerobotics.com
            REPO=vshie/blueos-site-esphome
            OWNER=vshie

      - name: Inspect published image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.tags.outputs.version }}"

      - name: Build arm64 artifact
        run: |
          docker buildx build \
            --platform linux/arm64/v8 \
            --tag "${IMAGE_NAME}:${{ steps.tags.outputs.git_hash }}" \
            --build-arg IMAGE_NAME=esphome \
            --build-arg AUTHOR='Tony White' \
            --build-arg AUTHOR_EMAIL='tony@bluerobotics.com' \
            --build-arg MAINTAINER='Tony White' \
            --build-arg MAINTAINER_EMAIL='tony@bluerobotics.com' \
            --build-arg REPO='vshie/blueos-site-esphome' \
            --build-arg OWNER='vshie' \
            --output "type=docker,dest=blueos-site-esphome-docker-image-${{ steps.tags.outputs.git_hash }}-arm64-v8.tar" \
            .

      - name: Upload artifact arm64-v8
        uses: actions/upload-artifact@v4
        with:
          name: blueos-site-esphome-docker-image-arm64-v8
          path: '*arm64-v8.tar'

      - name: Build amd64 artifact
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE_NAME}:${{ steps.tags.outputs.git_hash }}" \
            --build-arg IMAGE_NAME=esphome \
            --build-arg AUTHOR='Tony White' \
            --build-arg AUTHOR_EMAIL='tony@bluerobotics.com' \
            --build-arg MAINTAINER='Tony White' \
            --build-arg MAINTAINER_EMAIL='tony@bluerobotics.com' \
            --build-arg REPO='vshie/blueos-site-esphome' \
            --build-arg OWNER='vshie' \
            --output "type=docker,dest=blueos-site-esphome-docker-image-${{ steps.tags.outputs.git_hash }}-amd64.tar" \
            .

      - name: Upload artifact amd64
        uses: actions/upload-artifact@v4
        with:
          name: blueos-site-esphome-docker-image-amd64
          path: '*amd64.tar'
