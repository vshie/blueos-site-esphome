# Waveshare ESP32-S3-Relay-6CH — BlueOS / ESPHome (HA-optional)
# Pinout: https://www.waveshare.com/wiki/ESP32-S3-Relay-6CH
# Flash: 16MB. Bundled factory project for the `blueos-site-esphome` BlueOS extension.
#
# MQTT broker is NOT hardcoded here — it comes from !secret mqtt_broker, which the
# BlueOS setup wizard writes into secrets.yaml from the live Beacon hostname
# (`{hostname}.local`), not a fixed `blueos.local`. See secrets.yaml.example.

esphome:
  name: blueos-relay
  friendly_name: BlueOS Relay
  on_boot:
    priority: -10
    then:
      - delay: 2s
      - light.turn_on:
          id: rgb_led
          red: 0%
          green: 40%
          blue: 0%
          brightness: 30%
      # Prefer DS3231 wall time when available (works offline / AP-only).
      # ESPHome talks to DS3231 via the ds1307 platform (same I2C regs @ 0x68).
      - ds1307.read_time:
          id: rtc_time

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  level: INFO

# Native API kept for optional HA / aioesphomeapi clients (BlueOS can use MQTT instead).
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

# Join site LAN. Keep a short-lived fallback AP only if STA fails (not used as primary).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  reboot_timeout: 15min
  ap:
    ssid: "blueos-relay-fallback"
    password: "blueosrelay"

captive_portal:

web_server:
  port: 80

# MQTT broker = BlueOS Mosquitto (blueos-site-stack), injected by the blueos-site-esphome
# wizard from the BlueOS Beacon service (`GET /v1.0/hostname` -> "{hostname}.local"),
# never a hardcoded blueos.local. topic_prefix is coordinated with blueos-site-stack /
# blueos-site-ui, which expect `blueos/relay`.
mqtt:
  broker: !secret mqtt_broker
  discovery: false
  topic_prefix: blueos/relay
  # Default birth/will publish "online"/"offline" to blueos/relay/status — used by
  # blueos-site-ui to show device connectivity.

# Pico HAT I2C0 — Pico-RTC-DS3231 uses GP4=SDA, GP5=SCL (maps 1:1 on this board).
# Official Arduino Wire defaults (8/9) are NOT the Pico HAT bus.
i2c:
  id: i2c_bus
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 100kHz

# DS3231 is the offline clock of record (ESPHome platform name is ds1307).
# SNTP (when on a real LAN) writes back to the chip.
time:
  - platform: ds1307
    id: rtc_time
    address: 0x68
    timezone: Pacific/Honolulu
    update_interval: never

  - platform: sntp
    id: sntp_time
    timezone: Pacific/Honolulu
    on_time_sync:
      then:
        - logger.log: "SNTP synced — writing wall time to DS3231"
        - ds1307.write_time:
            id: rtc_time

uart:
  id: rs485_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600

# Ready for Daly / Modbus battery later — not enabled until a device is on the bus.
# modbus:
#   id: modbus_bus
#   uart_id: rs485_uart

binary_sensor:
  - platform: status
    name: "Status"

  - platform: gpio
    name: "Boot Button"
    pin:
      number: GPIO0
      ignore_strapping_warning: true
      mode:
        input: true
      inverted: true
    on_press:
      then:
        - button.press: restart_button

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  # DS3231 temperature registers 0x11/0x12 (0.25°C resolution). Consumed by
  # blueos-site-ui as the "RTC temperature" trend (Grafana / control page).
  - platform: template
    name: "RTC Temperature"
    id: rtc_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 60s
    lambda: |-
      uint8_t reg = 0x11;
      uint8_t data[2];
      if (id(i2c_bus).write_readv(0x68, &reg, 1, data, 2) != i2c::ERROR_OK) {
        return NAN;
      }
      int16_t raw = (int16_t(int8_t(data[0])) << 2) | (data[1] >> 6);
      return raw * 0.25f;

text_sensor:
  - platform: version
    name: "Firmware Version"

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

  # Human-readable RTC wall time, for the blueos-site-ui status table / debugging
  # clock drift without needing a separate time-sync tool.
  - platform: template
    name: "RTC DateTime"
    id: rtc_datetime
    icon: mdi:clock-outline
    update_interval: 30s
    lambda: |-
      auto t = id(rtc_time).now();
      if (!t.is_valid()) {
        return {"unknown"};
      }
      char buf[24];
      snprintf(buf, sizeof(buf), "%04d-%02d-%02d %02d:%02d:%02d",
               t.year, t.month, t.day_of_month, t.hour, t.minute, t.second);
      return std::string(buf);

switch:
  - platform: gpio
    name: "Relay 1"
    id: relay_1
    pin: GPIO1
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 2"
    id: relay_2
    pin: GPIO2
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 3"
    id: relay_3
    pin: GPIO41
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 4"
    id: relay_4
    pin: GPIO42
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 5"
    id: relay_5
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    # Prefer RESTORE_DEFAULT_ON if this channel feeds the Pi.
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 6"
    id: relay_6
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Buzzer Beep"
    id: buzzer_beep
    optimistic: true
    turn_on_action:
      - rtttl.play: "beep:d=4,o=5,b=100:16e6"
      - delay: 200ms
      - switch.turn_off: buzzer_beep

output:
  - platform: ledc
    pin: GPIO21
    id: buzzer_output

rtttl:
  output: buzzer_output
  id: rtttl_buzzer
  gain: 40%

light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    pin: GPIO38
    num_leds: 1
    rgb_order: GRB
    name: "RGB LED"
    id: rgb_led

button:
  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: config

  - platform: safe_mode
    name: "Safe Mode Boot"
    entity_category: config

  - platform: template
    name: "RTC Read from DS3231"
    id: rtc_read_button
    entity_category: config
    on_press:
      - ds1307.read_time:
          id: rtc_time

  - platform: template
    name: "RTC Write from ESP time"
    id: rtc_write_button
    entity_category: config
    on_press:
      - ds1307.write_time:
          id: rtc_time
